services:
  gateway:
    container_name: ms_gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - users
    env_file:
      - ./gateway/.env
    networks:
      - gateway_network
      - users_network
    volumes:
      - ./gateway_data:/app
    restart: unless-stopped

  users:
    container_name: ms_users
    build:
      context: ./users
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./users/.env
    networks:
      - users_network
      - gateway_network
      - db_network
    volumes:
      - ./users_data:/app
    restart: unless-stopped

  # alloy:
