upstream gateway {
    least_conn;
    server ms_gateway:5000 max_fails=3 fail_timeout=30s;
}

upstream chat {
    least_conn;
    server ms_chat:4002 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name fake-vinted.local;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://gateway/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        proxy_pass http://chat/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /docs {
        proxy_pass http://gateway/vinted/docs;
        proxy_set_header Host $host;
    }

    location /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    location ~* \.(php|asp|aspx|jsp)$ {
        return 444;
    }

    error_page 429 /429.json;
    error_page 500 502 503 504 /50x.json;

    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"statusCode":429,"message":"Too Many Requests"}';
    }

    location = /50x.json {
        internal;
        default_type application/json;
        return 500 '{"statusCode":500,"message":"Internal Server Error"}';
    }


}